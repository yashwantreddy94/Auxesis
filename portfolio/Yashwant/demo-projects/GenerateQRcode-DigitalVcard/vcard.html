<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .main-container {
            min-height: 100vh;
            min-height: 100svh;
            padding: clamp(1rem, 5vw, 2rem);
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            will-change: transform;
        }
        
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.08);
        }
        
        .contact-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .contact-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        .contact-item:hover::before {
            left: 100%;
        }
        
        .contact-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }
        
        .contact-item:active {
            transform: translateY(-1px);
        }
        
        .profile-circle {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            animation: profilePulse 6s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }
        
        .profile-circle::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shimmer 3s linear infinite;
        }
        
        @keyframes profilePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        
        @keyframes shimmer {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .tech-background {
            background: 
                radial-gradient(circle at 25% 25%, #667eea15 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, #764ba215 0%, transparent 50%),
                radial-gradient(circle at 50% 0%, #f093fb10 0%, transparent 50%),
                linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            position: relative;
        }
        
        .floating-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }
        
        .shape {
            position: absolute;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }
        
        .shape:nth-child(1) {
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }
        
        .shape:nth-child(2) {
            top: 20%;
            right: 10%;
            animation-delay: 2s;
        }
        
        .shape:nth-child(3) {
            bottom: 20%;
            left: 20%;
            animation-delay: 4s;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
        
        .icon-container {
            position: relative;
            overflow: hidden;
        }
        
        .icon-container::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        
        .contact-item:hover .icon-container::after {
            width: 100%;
            height: 100%;
        }
        
        .tech-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            animation: badgeGlow 4s ease-in-out infinite;
        }
        
        @keyframes badgeGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(102, 126, 234, 0.3); }
            50% { box-shadow: 0 0 30px rgba(118, 75, 162, 0.5); }
        }
        
        @media (max-width: 640px) {
            .main-container {
                padding: 1rem;
            }
            
            .profile-circle {
                width: 5rem;
                height: 5rem;
            }
            
            .profile-circle svg {
                width: 2.5rem;
                height: 2.5rem;
            }
            
            .contact-item {
                padding: 1rem;
            }
            
            .icon-container {
                width: 2.5rem;
                height: 2.5rem;
            }
            
            .icon-container svg {
                width: 1.25rem;
                height: 1.25rem;
            }
        }
        
        @media (min-width: 641px) and (max-width: 768px) {
            .main-container {
                padding: 1.5rem;
            }
        }
        
        @media (min-width: 1024px) {
            .card-container {
                max-width: 28rem;
            }
        }
        
        @media (prefers-color-scheme: dark) {
            .tech-background {
                background: 
                    radial-gradient(circle at 25% 25%, #667eea20 0%, transparent 50%),
                    radial-gradient(circle at 75% 75%, #764ba220 0%, transparent 50%),
                    linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            }
            
            .card {
                background: rgba(30, 30, 50, 0.95);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
        }
        
        .fade-in {
            animation: fadeIn 0.8s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        html {
            scroll-behavior: smooth;
        }

        /* Fallback for browsers without backdrop-filter support */
        @supports not (backdrop-filter: blur(20px)) {
            .card {
                background: rgba(255, 255, 255, 0.98);
            }
            @media (prefers-color-scheme: dark) {
                .card {
                    background: rgba(30, 30, 50, 0.98);
                }
            }
        }
    </style>
</head>

    <script>
        function sanitizeInput(input) {
            if (!input) return '';
            return input.replace(/[<>&"]/g, char => ({
                '<': '&lt;',
                '>': '&gt;',
                '&': '&amp;',
                '"': '&quot;'
            }[char]));
        }

        function getQueryParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                name: sanitizeInput(params.get('name')) || '',
                company: sanitizeInput(params.get('company')) || '',
                designation: sanitizeInput(params.get('designation')) || '',
                email: sanitizeInput(params.get('email')) || '',
                phone: sanitizeInput(params.get('phone')) || '',
                logo: sanitizeInput(params.get('logo')) || 'logo.png',
                company_phone: sanitizeInput(params.get('company_phone')) || '+91123456789',
                company_email: sanitizeInput(params.get('company_email')) || 'info@info.com',
                website: sanitizeInput(params.get('website')) || 'https://yashwantreddy94.github.io/portfolio/'
            };
        }

        function displayVCard() {
            try {
                const data = getQueryParams();
                
                document.title = data.name && data.company ? `${data.name} - ${data.company} vCard` : 'Tech vCard';

                ['name', 'designation', 'company'].forEach(id => {
                    const element = document.getElementById(id);
                    element.style.opacity = '0';
                    setTimeout(() => {
                        element.textContent = data[id];
                        element.style.opacity = '1';
                        if (!data[id]) element.style.display = 'none';
                    }, 100);
                });

                const logoImg = document.getElementById('company_logo');
                logoImg.src = data.logo;
                logoImg.alt = data.company ? `${data.company} Logo` : 'Company Logo';

                const phoneLink = document.getElementById('phone');
                phoneLink.querySelector('span').textContent = data.phone;
                phoneLink.href = data.phone ? `tel:${data.phone.replace(/\s|\(|\)|-/g, '')}` : '#';

                const emailLink = document.getElementById('email');
                emailLink.querySelector('span').textContent = data.email;
                emailLink.href = data.email ? `mailto:${data.email}` : '#';

                const websiteLink = document.getElementById('website');
                websiteLink.querySelector('span').textContent = data.website.replace(/^https?:\/\//, '');
                websiteLink.href = data.website || '#';

                const companyPhoneLink = document.getElementById('company_phone');
                companyPhoneLink.querySelector('span').textContent = data.company_phone;
                companyPhoneLink.href = data.company_phone ? `tel:${data.company_phone.replace(/\s|\(|\)|-/g, '')}` : '#';

                const companyEmailLink = document.getElementById('company_email');
                companyEmailLink.querySelector('span').textContent = data.company_email;
                companyEmailLink.href = data.company_email ? `mailto:${data.company_email}` : '#';

                document.querySelector('.card-container').classList.add('fade-in');
            } catch (error) {
                console.error('Error displaying vCard:', error);
                document.querySelector('.card-container').innerHTML = '<p class="text-red-600 text-center p-4">Failed to load contact information. Please try again.</p>';
            }
        }

        function addCopyFunctionality() {
            const contactItems = document.querySelectorAll('.contact-item');
            contactItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    if (e.target.tagName === 'A' || e.target.closest('a')) return;
                    const textToCopy = this.querySelector('a span').textContent;
                    if (textToCopy) {
                        if (navigator.clipboard) {
                            navigator.clipboard.writeText(textToCopy).then(() => {
                                showCopyFeedback(this);
                            });
                        } else {
                            const textarea = document.createElement('textarea');
                            textarea.value = textToCopy;
                            document.body.appendChild(textarea);
                            textarea.select();
                            document.execCommand('copy');
                            document.body.removeChild(textarea);
                            showCopyFeedback(this);
                        }
                    }
                });
            });
        }

        function generateVCard() {
            const data = getQueryParams();
            const vcard = ['BEGIN:VCARD', 'VERSION:3.0'];
            if (data.name) vcard.push(`FN:${data.name}`);
            if (data.company) vcard.push(`ORG:${data.company}`);
            if (data.designation) vcard.push(`TITLE:${data.designation}`);
            if (data.phone) vcard.push(`TEL;TYPE=CELL:${data.phone}`);
            if (data.email) vcard.push(`EMAIL:${data.email}`);
            if (data.company_phone) vcard.push(`TEL;TYPE=WORK:${data.company_phone}`);
            if (data.company_email) vcard.push(`EMAIL;TYPE=WORK:${data.company_email}`);
            if (data.website) vcard.push(`URL:${data.website}`);
            vcard.push('END:VCARD');
            return vcard.join('\n');
        }

        function downloadVCard() {
            const data = getQueryParams();
            const vcard = generateVCard();
            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = data.name ? `${data.name.replace(/\s+/g, '_')}_contact.vcf` : 'contact.vcf';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(url);

            const button = document.getElementById('addToContact');
            const originalText = button.innerHTML;
            button.innerHTML = '<svg aria-hidden="true" class="w-5 h-5 sm:w-6 sm:h-6 mr-2" fill="currentColor" viewBox="0 0 24 24"><path d="M9,20.42L2.79,14.21L5.62,11.38L9,14.77L18.88,4.88L21.71,7.71L9,20.42Z"/></svg>Added to Contacts!';
            button.style.background = 'linear-gradient(135deg, #10b981, #059669)';
            setTimeout(() => {
                button.innerHTML = originalText;
                button.style.background = '';
            }, 1500);
        }

        function showCopyFeedback(element) {
            const originalBg = element.style.background;
            element.style.background = 'rgba(34, 197, 94, 0.1)';
            element.style.borderColor = 'rgba(34, 197, 94, 0.3)';
            setTimeout(() => {
                element.style.background = originalBg;
                element.style.borderColor = '';
            }, 1000);
        }

        window.addEventListener('load', () => {
            displayVCard();
            addCopyFunctionality();
            document.getElementById('addToContact').addEventListener('click', downloadVCard);
            setTimeout(() => {
                document.querySelector('.card-container').style.transform = 'translateY(0)';
                document.querySelector('.card-container').style.opacity = '1';
            }, 100);
        });

        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            document.documentElement.style.setProperty('--animation-duration', '0.01ms');
        }
    </script>
</body>
