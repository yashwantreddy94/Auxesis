<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate vCard QR Code</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .main-container {
            min-height: 100vh;
            min-height: 100svh;
            padding: clamp(1rem, 5vw, 2rem);
        }

        .card {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            will-change: transform;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.08);
        }

        .tech-background {
            background: 
                radial-gradient(circle at 25% 25%, #667eea15 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, #764ba215 0%, transparent 50%),
                radial-gradient(circle at 50% 0%, #f093fb10 0%, transparent 50%),
                linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            position: relative;
        }

        .floating-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }

        .shape:nth-child(1) {
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            top: 20%;
            right: 10%;
            animation-delay: 2s;
        }

        .shape:nth-child(3) {
            bottom: 20%;
            left: 20%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        .tech-button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            animation: badgeGlow 4s ease-in-out infinite;
        }

        @keyframes badgeGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(102, 126, 234, 0.3); }
            50% { box-shadow: 0 0 30px rgba(118, 75, 162, 0.5); }
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            .main-container {
                padding: 1rem;
            }

            .card {
                padding: 1.5rem;
            }

            input, button {
                padding: 0.75rem;
                font-size: 0.9rem;
            }

            #qrCode canvas {
                width: 150px !important;
                height: 150px !important;
            }
        }

        @media (prefers-color-scheme: dark) {
            .tech-background {
                background: 
                    radial-gradient(circle at 25% 25%, #667eea20 0%, transparent 50%),
                    radial-gradient(circle at 75% 75%, #764ba220 0%, transparent 50%),
                    linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            }

            .card {
                background: rgba(30, 30, 50, 0.95);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
        }

        @supports not (backdrop-filter: blur(20px)) {
            .card {
                background: rgba(255, 255, 255, 0.98);
            }
            @media (prefers-color-scheme: dark) {
                .card {
                    background: rgba(30, 30, 50, 0.98);
                }
            }
        }

        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="tech-background">
    <div class="floating-shapes">
        <div class="shape w-8 h-8 bg-gradient-to-r from-blue-400 to-purple-500 rounded-full"></div>
        <div class="shape w-6 h-6 bg-gradient-to-r from-pink-400 to-red-500 rounded-lg"></div>
        <div class="shape w-10 h-10 bg-gradient-to-r from-green-400 to-blue-500 rounded-full"></div>
    </div>

    <div class="main-container flex items-center justify-center">
        <div class="card rounded-3xl shadow-2xl p-6 sm:p-8 w-full max-w-lg fade-in">
            <h2 class="text-2xl sm:text-3xl font-bold text-center text-gray-800 dark:text-white mb-6">Create vCard QR Code</h2>
            <form id="qrForm" class="space-y-4">
                <div>
                    <label for="name" class="text-sm text-gray-600 dark:text-gray-300 font-medium">Full Name</label>
                    <input type="text" id="name" placeholder="Enter full name" maxlength="50" class="w-full p-3 rounded-lg border border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition bg-white dark:bg-gray-800 text-gray-900 dark:text-white" required>
                </div>
                <div>
                    <label for="company" class="text-sm text-gray-600 dark:text-gray-300 font-medium">Company Name</label>
                    <input type="text" id="company" placeholder="Enter company name" maxlength="50" class="w-full p-3 rounded-lg border border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition bg-white dark:bg-gray-800 text-gray-900 dark:text-white" required>
                </div>
                <div>
                    <label for="designation" class="text-sm text-gray-600 dark:text-gray-300 font-medium">Designation</label>
                    <input type="text" id="designation" placeholder="Enter designation" maxlength="30" class="w-full p-3 rounded-lg border border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition bg-white dark:bg-gray-800 text-gray-900 dark:text-white" required>
                </div>
                <div>
                    <label for="email" class="text-sm text-gray-600 dark:text-gray-300 font-medium">Email Address</label>
                    <input type="email" id="email" placeholder="Enter email address" maxlength="50" class="w-full p-3 rounded-lg border border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition bg-white dark:bg-gray-800 text-gray-900 dark:text-white" required>
                </div>
                <div>
                    <label for="phone" class="text-sm text-gray-600 dark:text-gray-300 font-medium">Phone Number</label>
                    <input type="tel" id="phone" placeholder="Enter phone number" maxlength="15" class="w-full p-3 rounded-lg border border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition bg-white dark:bg-gray-800 text-gray-900 dark:text-white" required>
                </div>
                <button type="button" onclick="generateQR()" aria-label="Generate QR code for vCard" class="tech-button w-full text-white p-3 rounded-lg font-semibold hover:shadow-xl transition transform hover:-translate-y-1">Generate QR Code</button>
            </form>
            <div id="urlDisplay" class="mt-4 text-sm text-gray-600 dark:text-gray-300 break-all"></div>
            <div id="qrCode" class="mt-6 flex justify-center"></div>
            <div id="downloadButton" class="mt-4 text-center hidden">
                <button onclick="downloadQR()" aria-label="Download QR code as PNG" class="tech-button inline-flex items-center px-6 py-3 rounded-full text-white font-semibold shadow-lg hover:shadow-xl transform hover:scale-105 transition-all duration-300">
                    <svg aria-hidden="true" class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                    </svg>
                    Download QR Code
                </button>
            </div>
        </div>
    </div>

    <script>
        function sanitizeInput(input) {
            if (!input) return '';
            return input.replace(/[<>&"]/g, char => ({
                '<': '<',
                '>': '>',
                '&': '&',
                '"': '"'
            }[char])).trim();
        }

        function generateQR() {
            const fields = [
                { id: 'name', maxLength: 50 },
                { id: 'company', maxLength: 50 },
                { id: 'designation', maxLength: 30 },
                { id: 'email', maxLength: 50 },
                { id: 'phone', maxLength: 15 }
            ];

            const data = {};
            let isValid = true;

            fields.forEach(field => {
                const value = sanitizeInput(document.getElementById(field.id).value.slice(0, field.maxLength));
                data[field.id] = value;
                if (!value) isValid = false;
            });

            if (!isValid) {
                alert('Please fill in all required fields.');
                return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email)) {
                alert('Please enter a valid email address.');
                return;
            }

            if (!/^\+?\d{7,15}$/.test(data.phone.replace(/\s|\(|\)|-/g, ''))) {
                alert('Please enter a valid phone number (7-15 digits).');
                return;
            }

            const baseUrl = 'https://yashwantreddy94.github.io/GenerateQRcode-DigitalVcard/vcard.html'; // Replace with your vCard URL
            const qrData = `${baseUrl}?name=${encodeURIComponent(data.name)}&company=${encodeURIComponent(data.company)}&designation=${encodeURIComponent(data.designation)}&email=${encodeURIComponent(data.email)}&phone=${encodeURIComponent(data.phone)}`;

            if (qrData.length > 1000) {
                alert('Input data is too long for QR code. Please shorten the fields.');
                return;
            }

            const urlDisplay = document.getElementById('urlDisplay');
            urlDisplay.innerHTML = `Generated URL: <a href="${qrData}" target="_blank" class="text-indigo-600 dark:text-indigo-400 hover:underline">${qrData}</a>`;
            urlDisplay.style.opacity = '0';
            setTimeout(() => { urlDisplay.style.opacity = '1'; }, 100);

            const qrCodeDiv = document.getElementById('qrCode');
            qrCodeDiv.innerHTML = '<p class="text-gray-600 dark:text-gray-300">Generating QR code...</p>';

            QRCode.toCanvas(qrData, { width: 200, margin: 2, color: { dark: '#000000', light: '#FFFFFF' } }, function (error, canvas) {
                qrCodeDiv.innerHTML = '';
                if (error) {
                    console.error('QR Code Error:', error);
                    qrCodeDiv.innerHTML = '<p class="text-red-600 text-center">Failed to generate QR code. Try shortening the input data.</p>';
                    document.getElementById('downloadButton').classList.add('hidden');
                    return;
                }
                qrCodeDiv.appendChild(canvas);
                document.getElementById('downloadButton').classList.remove('hidden');
            });
        }

        function downloadQR() {
            const canvas = document.getElementById('qrCode').querySelector('canvas');
            if (!canvas) {
                alert('No QR code available to download.');
                return;
            }

            const name = sanitizeInput(document.getElementById('name').value.slice(0, 50)) || 'contact';
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = `${name.replace(/\s+/g, '_')}_qrcode.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            const button = document.getElementById('downloadButton').querySelector('button');
            const originalText = button.innerHTML;
            button.innerHTML = '<svg aria-hidden="true" class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24"><path d="M9,20.42L2.79,14.21L5.62,11.38L9,14.77計画18.88,4.88L21.71,7.71L9,20.42Z"/></svg>Downloaded!';
            button.style.background = 'linear-gradient(135deg, #10b981, #059669)';
            setTimeout(() => {
                button.innerHTML = originalText;
                button.style.background = '';
            }, 1500);
        }

        window.addEventListener('load', () => {
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.documentElement.style.setProperty('--animation-duration', '0.01ms');
            }
        });
    </script>
</body>
</html>
